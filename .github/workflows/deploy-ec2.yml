name: CI/CD to EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-push-deploy:
    runs-on: ubuntu-latest
    needs: playwright-tests

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE_NAME }}:latest .
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE=${{ secrets.DOCKER_IMAGE_NAME }}:latest
            sudo docker pull $IMAGE

            sudo docker rm -f app-candidate 2>/dev/null || true
            sudo docker run -d --name app-candidate -p 8081:8080 $IMAGE
            until curl -fs http://localhost:8081/health; do sleep 1; done

            sudo docker rm -f app 2>/dev/null || true
            sudo docker run -d --name app --restart unless-stopped -p 80:8080 $IMAGE
            sudo docker rm -f app-candidate
